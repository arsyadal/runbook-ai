name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: runbookai-x86_64-unknown-linux-gnu.tar.gz
            binary: runbookai
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: runbookai-x86_64-apple-darwin.tar.gz
            binary: runbookai
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: runbookai-aarch64-apple-darwin.tar.gz
            binary: runbookai
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: runbookai-x86_64-pc-windows-msvc.zip
            binary: runbookai.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          tar -C dist -czf ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          Compress-Archive -Path dist/${{ matrix.binary }} -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: artifacts/**/*
